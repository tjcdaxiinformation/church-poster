<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會籍資料更新海報預覽 - 大溪教會</title>
    <style>
        body { background-color: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: "Microsoft JhengHei", sans-serif; }
        .poster { 
            background: white; 
            width: 420px; /* 模擬 A3 比例 */
            min-height: 594px; 
            padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 10px double #2c3e50;
            text-align: center;
        }
        h1 { color: #c0392b; font-size: 32px; margin-bottom: 5px; }
        h2 { color: #2c3e50; font-size: 20px; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        .content { text-align: left; margin-top: 30px; line-height: 1.8; }
        .highlight { background-color: #fcf3cf; padding: 15px; border-radius: 8px; border-left: 5px solid #f1c40f; }
        .step-box { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .step { background: #ecf0f1; padding: 10px; border-radius: 5px; }
        .step b { color: #2980b9; }
        .footer { margin-top: 40px; font-size: 14px; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px; }
        .red-text { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="poster">
        <h1>讓愛與關懷，精準送達</h1>
        <h2>會籍資料定期更新</h2>
        
        <div class="content">
            <p class="highlight">「從心裡面的關懷，從準確的資料開始。」</p>
            
            <p>親愛的信徒平安：請於靈恩會期間檢查半年來的基本資料異動，使教會紀錄保持最新狀態。</p>
            
            <div class="step-box">
                <div class="step">❶ <b>領取</b>：休息期間向<b>資訊股</b>領取全家資料紙本。</div>
                <div class="step">❷ <b>核對</b>：檢視地址、電話、個人資料是否有更動。</div>
                <div class="step">❸ <b>註記</b>：請直接以<span class="red-text">紅筆註記</span>，並繳回負責人。</div>
            </div>
        </div>

        <div class="footer">
            <p>TJC 大溪教會 資訊股 敬邀</p>
            <p>2026年4月 靈恩佈道會</p>
        </div>
    </div>
</body>
</html>
